<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動網頁範例</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        #status-text {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            transition: all 0.3s ease; /* 讓顏色切換更平滑 */
        }

        .custom-button {
            padding: 12px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .custom-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="status-text">滑鼠還沒過來...</div>

    <button id="interactive-btn" class="custom-button">把滑鼠移上來！</button>

    <script>
        const textElement = document.getElementById('status-text');
        const button = document.getElementById('interactive-btn');

        // 當滑鼠移入按鈕
        button.addEventListener('mouseover', () => {
            textElement.textContent = '哦！你發現我了！';
            textElement.style.color = '#e91e63'; // 變成粉紅色
            textElement.style.transform = 'scale(1.1)';
        });

        // 當滑鼠移出按鈕
        button.addEventListener('mouseout', () => {
            textElement.textContent = '滑鼠又走掉了。';
            textElement.style.color = '#333'; // 變回深灰色
            textElement.style.transform = 'scale(1.0)';
        });
    </script>

</body>
</html>
