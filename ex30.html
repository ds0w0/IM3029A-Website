<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動式按鈕網頁</title>
    <style>
        /* CSS 樣式設定 */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
        }

        #display-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            transition: all 0.3s ease; /* 平滑變色效果 */
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div id="display-text">原始內容：請與按鈕互動</div>
    <button id="interact-btn">把滑鼠移過來！</button>

    <script>
        const btn = document.getElementById('interact-btn');
        const text = document.getElementById('display-text');

        // 當滑鼠移入按鈕時
        btn.addEventListener('mouseover', () => {
            text.textContent = '滑鼠正在按鈕上！';
            text.style.color = '#e74c3c'; // 變為紅色
            text.style.fontSize = '30px'; // 稍微變大
        });

        // 當滑鼠移出按鈕時
        btn.addEventListener('mouseout', () => {
            text.textContent = '原始內容：請與按鈕互動';
            text.style.color = '#333'; // 恢復深灰色
            text.style.fontSize = '24px'; // 恢復原尺寸
        });
    </script>

</body>
</html>
