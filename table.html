<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>表格與固定定位練習</title>
    <style>
        /* 基礎版面設定：模擬圖片中的灰色背景與卡片效果 */
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 50px;
        }

        .container {
            background-color: white;
            padding: 20px;
            min-height: 200px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            position: relative; /* 作為定位參考 */
        }

        /* --- 1. 表格樣式教學 --- */
        table {
            border-collapse: collapse; /* 讓邊框合併成單一線條，不會有間隙 */
            width: 300px;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
        }

        /* 設定表頭顏色：深灰色背景、白色文字 */
        th {
            background-color: #666666;
            color: white;
        }

        /* 設定奇數列 (1, 3, 5...) 的背景顏色為黃色 */
        /* 因為表格第一列資料是奇數列，所以會變黃色 */
        tbody tr:nth-child(odd) {
            background-color: yellow;
        }

        /* --- 2. 固定定位樣式教學 --- */
        .fixed-div {
            /* 關鍵：設定為固定定位 */
            position: fixed; 
            top: 50px;    /* 距離視窗頂部 50px */
            right: 50px;  /* 距離視窗右側 50px */
            
            width: 150px;
            padding: 10px;
            border: 3px solid #6b8e23; /* 橄欖綠邊框 */
            background-color: white;
            font-size: 14px;
            z-index: 999; /* 確保它會浮在所有元素最上面 */
        }
    </style>
</head>
<body>

    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="fixed-div">
        This div element has position: fixed;
    </div>

</body>
</html>
