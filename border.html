<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<title>CSS Borders and Backgrounds Practice</title>
    <style>
    /* 基礎共用樣式 */
    .box {
    	font-family: "Times New Roman", serif;
    	font-size: 2.5rem;
        font-weight: bold;
		padding: 10px 20px;
		margin: 20px;
		width: 80%; /* 長條狀 */
	}
    
    .box-1 {
		background-color: lightblue;
		border: 6px double tomato; /* 雙線 */
	}
    
    .box-2 {
		background-color: yellow;
		border: 3px solid dodgerblue;
		border-radius: 25px; /* 圓角 */
	}
    
    .box-3 {
		background-color: #3cb371;
		border: 10px dotted gray; /* 點狀 */
		color: black;
	}
    </style>
</head>
<body>

	<div class="box box-1">Hello World</div>
	<div class="box box-2">Hello World</div>
	<div class="box box-3">Hello World</div>

</body>
</html>
